name: Deploy to GitHub Pages

on:
  # Publica sempre que a main mudar
  push:
    branches: [main]
  # Permite disparar/re-executar o deploy manualmente pela aba Actions
  workflow_dispatch:

# Permissões mínimas necessárias para o deploy do Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Garante um deploy por vez, sem cancelar um em andamento
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: Empacotar site estático (raiz do repositório)
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy para o GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
